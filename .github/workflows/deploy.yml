name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v3
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync build to server
        run: |
          rsync -avz --delete -e "ssh -p ${{ secrets.SSH_PORT || 22 }}" \
            .next/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/gestion-scolaire-front/.next/

      - name: Sync node_modules (if needed)
        run: |
          rsync -avz --delete -e "ssh -p ${{ secrets.SSH_PORT || 22 }}" \
            node_modules/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/gestion-scolaire-front/node_modules/

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /var/www/gestion-scolaire-front
            git pull origin master -q
            pm2 reload school-frontend --update-env

      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployed to school.ptrniger.com"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
